<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeJournal</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">TL</div>
        <div class="brand-name">TradeLog</div>
      </div>

      <nav class="nav">
        <button class="nav-item active" onclick="showSection('dashboard')">Dashboard</button>
        <button class="nav-item" onclick="showSection('journal')">Journal</button>
        <button class="nav-item" onclick="showSection('newTrade')">New Trade</button>
        <button class="nav-item" onclick="showSection('reports')">Reports</button>
      </nav>

      <div class="sidebar-foot">Local • Private</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="welcome">
          <h1>Welcome, Trader</h1>
          <div class="subtitle">FTMO-style Journal</div>
        </div>
        <div class="top-actions">
          <button id="exportPdfBtn" class="btn ghost">Export PDF</button>
          <div class="profile">👤 You</div>
        </div>
      </header>

      <section id="dashboard" class="page active">
        <div class="ticker" id="ticker">
          <div id="tickerContent" class="ticker-inner"></div>
        </div>

        <div class="cards">
          <div class="card stat">
            <div class="label">Net P/L</div>
            <div id="statNet" class="value">—</div>
          </div>
          <div class="card stat">
            <div class="label">Win Rate</div>
            <div id="statWin" class="value">—</div>
          </div>
          <div class="card stat">
            <div class="label">Avg R:R</div>
            <div id="statRR" class="value">—</div>
          </div>
          <div class="card stat">
            <div class="label">Trades</div>
            <div id="statTotal" class="value">0</div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">Equity Curve</div>
            <canvas id="equityChart" height="180"></canvas>
          </div>
          <div class="card">
            <div class="card-header">Recent Trades</div>
            <div id="recentList" class="recent-list"></div>
          </div>
        </div>
      </section>

      <section id="journal" class="page">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2>Journal</h2>
          <button id="clearAllBtn" class="btn" style="background: linear-gradient(90deg, #ff4d4d, #ff1a1a); color: white; font-weight: 600; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);">🗑️ Clear All Trades</button>
        </div>
        
        <div class="filters" style="margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
          <button class="filter-btn active" data-cat="All">All</button>
          <button class="filter-btn" data-cat="Forex">Forex</button>
          <button class="filter-btn" data-cat="Gold">Gold</button>
          <button class="filter-btn" data-cat="Silver">Silver</button>
          <button class="filter-btn" data-cat="Oil">Oil</button>
          <button class="filter-btn" data-cat="Crypto">Crypto</button>
          <input id="searchBox" placeholder="Search symbol..." autocomplete="off" style="margin-left: auto;" />
        </div>

        <div class="card">
          <div class="overflow">
            <table class="journal-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Symbol</th>
                  <th>Cat</th>
                  <th>Side</th>
                  <th>Entry</th>
                  <th>Exit</th>
                  <th>Lot</th>
                  <th>P/L</th>
                  <th>Liquidity Sweep</th>
                  <th>Screenshot</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="journalBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="newTrade" class="page">
        <h2>New Trade</h2>
        <div class="card form-card">
          <form id="tradeForm" autocomplete="off">
            <div class="form-grid">
              <label>Date
                <input id="tradeDate" name="trade_date" type="date" required autocomplete="off" />
              </label>

              <label>Time
                <input id="tradeTime" name="trade_time" type="time" autocomplete="off" />
              </label>

              <label>Symbol
                <input id="symbol" name="trade_symbol" placeholder="e.g. EURUSD / XAUUSD / XAGUSD" required autocomplete="off" />
              </label>

              <label>Side
                <select id="side" name="trade_side" autocomplete="off">
                  <option value="long">Long</option>
                  <option value="short">Short</option>
                </select>
              </label>

              <label>Entry Price
                <input id="entry" name="trade_entry" type="number" step="any" autocomplete="off" />
              </label>

              <label>Exit Price
                <input id="exit" name="trade_exit" type="number" step="any" autocomplete="off" />
              </label>

              <label>Stop Loss
                <input id="stoploss" name="trade_stoploss" type="number" step="any" autocomplete="off" />
              </label>

              <label>Lot Size
                <input id="lot" name="trade_lot" type="number" step="any" value="1" autocomplete="off" />
              </label>

              <label>Contract Size
                <input id="contract" name="trade_contract" type="number" step="any" value="1" autocomplete="off" />
              </label>

              <label>Category
                <select id="category" name="trade_category" required>
                  <option value="Forex">Forex</option>
                  <option value="Gold">Gold</option>
                  <option value="Silver">Silver</option>
                  <option value="Crypto">Crypto</option>
                  <option value="Stocks">Stocks</option>
                  <option value="Oil">Oil</option>
                  <option value="Other" selected>Other</option>
                </select>
              </label>

              <label>Liquidity Sweep?
                <select id="liquidityTag" name="trade_liquidity">
                  <option value="No" selected>No Sweep</option>
                  <option value="Yes">Yes (Liquidity Swept)</option>
                </select>
              </label>

              <label>Liquidity Timeframe
                <select id="liquidityTF" name="trade_liquidity_tf">
                  <option value="None" selected>—</option>
                  <option value="5m">5 Min</option>
                  <option value="15m">15 Min</option>
                  <option value="30m">30 Min</option>
                  <option value="1h">1 Hr</option>
                  <option value="4h">4 Hr</option>
                  <option value="1D">1 Day</option>
                </select>
              </label>
            </div>

            <label style="margin-top: 10px; display: block;">P/L Preview
              <input id="plPreview" name="trade_pl" readonly autocomplete="off" style="background: rgba(255,255,255,0.02);" />
            </label>

            <label style="margin-top: 15px; display: block;">Screenshot
              <input type="file" id="screenshot" name="trade_screenshot" accept="image/*" autocomplete="off">
            </label>

            <div class="form-actions">
              <button id="saveBtn" class="btn" type="submit">Save Trade</button>
              <button id="resetBtn" type="button" class="btn ghost">Reset</button>
            </div>
          </form>
        </div>
      </section>

      <section id="reports" class="page">
        <h2>Reports</h2>
        <div class="cards">
          <div class="card">
            <div class="card-header">Win vs Loss</div>
            <canvas id="winLossChart" height="160"></canvas>
          </div>
          <div class="card">
            <div class="card-header">Monthly P/L</div>
            <canvas id="monthlyChart" height="160"></canvas>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
